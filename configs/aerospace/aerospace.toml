# HackermacUI — AeroSpace config
# Public, shareable baseline. Machine-specific paths should stay in private overlays.

config-version = 2

# Launch visual focus borders with AeroSpace. The bordersrc also works standalone.
after-startup-command = ['exec-and-forget /bin/bash -lc "$HOME/.config/borders/bordersrc"']

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Keep macOS Separate Spaces enabled; avoid native fullscreen as the tiling path.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

# Default portable layout: four numbered workspaces.
persistent-workspaces = ['1', '2', '3', '4']

[key-mapping]
    preset = 'qwerty'

[gaps]
    # Native macOS menu bar owns top space; keep only a small visual gap.
    inner.horizontal = 5
    inner.vertical = 5
    outer.left = 8
    outer.bottom = 8
    outer.top = 8
    outer.right = 8

[mode.main.binding]
    # App launchers.
    cmd-enter = 'exec-and-forget open -na Ghostty'
    cmd-b = 'exec-and-forget open -na "Google Chrome"'
    cmd-f = 'exec-and-forget open -na Finder'
    cmd-o = 'exec-and-forget open -na Obsidian'
    cmd-d = 'exec-and-forget /bin/bash -lc "open -na Ghostty --args -e lazydocker"'

    # Focus.
    alt-left = 'focus left'
    alt-down = 'focus down'
    alt-up = 'focus up'
    alt-right = 'focus right'
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # Resize.
    alt-shift-left = 'resize width -50'
    alt-shift-right = 'resize width +50'
    alt-shift-up = 'resize height -50'
    alt-shift-down = 'resize height +50'
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # Move/reorder focused window.
    alt-ctrl-left = 'move left'
    alt-ctrl-down = 'move down'
    alt-ctrl-up = 'move up'
    alt-ctrl-right = 'move right'

    # Workspaces.
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-0 = 'workspace 10'

    # Send focused window away without following it.
    alt-ctrl-1 = 'move-node-to-workspace 1'
    alt-ctrl-2 = 'move-node-to-workspace 2'
    alt-ctrl-3 = 'move-node-to-workspace 3'
    alt-ctrl-4 = 'move-node-to-workspace 4'
    alt-ctrl-5 = 'move-node-to-workspace 5'
    alt-ctrl-6 = 'move-node-to-workspace 6'
    alt-ctrl-7 = 'move-node-to-workspace 7'
    alt-ctrl-8 = 'move-node-to-workspace 8'
    alt-ctrl-9 = 'move-node-to-workspace 9'
    alt-ctrl-0 = 'move-node-to-workspace 10'

    # Tiling controls.
    alt-shift-f = 'fullscreen'
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Service mode for rarely used/destructive operations.
    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    b = ['balance-sizes', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-left = ['join-with left', 'mode main']
    alt-shift-down = ['join-with down', 'mode main']
    alt-shift-up = ['join-with up', 'mode main']
    alt-shift-right = ['join-with right', 'mode main']
