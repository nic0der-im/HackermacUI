# HackermacUI — AeroSpace config
# Public, shareable baseline. Machine-specific paths should stay in private overlays.

config-version = 2

# Launch visual focus borders with AeroSpace. The bordersrc also works standalone.
after-startup-command = ['exec-and-forget /bin/bash -lc "$HOME/.config/borders/bordersrc"']

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Keep macOS Separate Spaces enabled; avoid native fullscreen as the tiling path.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
exec-on-workspace-change = ['/bin/bash', '-lc', '/bin/bash "$HOME/.config/aerospace/scripts/refresh-swiftbar-workspaces.sh" aerospace-workspaces.3s.sh']
automatically-unhide-macos-hidden-apps = false

# Fixed dual-monitor layout: LG owns 1-3, built-in Retina owns 4-6.
persistent-workspaces = ['1', '2', '3', '4', '5', '6']

[workspace-to-monitor-force-assignment]
    '1' = ['LG ULTRAWIDE', 'built-in']
    '2' = ['LG ULTRAWIDE', 'built-in']
    '3' = ['LG ULTRAWIDE', 'built-in']
    '4' = ['built-in', 'LG ULTRAWIDE']
    '5' = ['built-in', 'LG ULTRAWIDE']
    '6' = ['built-in', 'LG ULTRAWIDE']

# Native macOS apps, settings panels, and utility dialogs are better treated as
# transient tools than tiled work surfaces.
[[on-window-detected]]
    if.app-id = 'com.apple.finder'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.systempreferences'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.AppStore'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.ActivityMonitor'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.Console'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.DiskUtility'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.keychainaccess'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.Preview'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.TextEdit'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.shortcuts'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.archiveutility'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.LocalAuthentication.UIAgent'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.SecurityAgent'
    run = ['layout floating']

[[on-window-detected]]
    if.app-id = 'com.apple.AccessibilityUIServer'
    run = ['layout floating']

[[on-window-detected]]
    if.app-name-regex-substring = 'HackermacLauncher'
    run = ['layout floating']

# Steam uses helper windows for the main client and most popups. Keep them
# floating so chats, settings, login prompts, and dialogs don't break tiling.
[[on-window-detected]]
    if.app-id = 'com.valvesoftware.steam.helper'
    run = ['layout floating', 'move-node-to-workspace 3']

[[on-window-detected]]
    if.app-id = 'com.valvesoftware.steam'
    run = ['layout floating', 'move-node-to-workspace 3']

# reVC is launched as a standalone Mach-O binary without a bundle id. Match the
# app name reported by AeroSpace and keep the game outside tiling.
[[on-window-detected]]
    if.app-name-regex-substring = 'reVC'
    run = ['layout floating']

[key-mapping]
    preset = 'qwerty'

[gaps]
    # Native macOS menu bar owns top space; keep only a small visual gap.
    inner.horizontal = 10
    inner.vertical = 10
    outer.left = 10
    outer.bottom = 10
    outer.top = 8
    outer.right = 10


[mode.main.binding]
    # App launchers.
    cmd-enter = 'exec-and-forget open -na Ghostty'
    cmd-b = 'exec-and-forget open -na "Google Chrome"'
    cmd-shift-f = 'exec-and-forget /bin/bash -lc "$HOME/.config/aerospace/scripts/finder-new-window"'
    cmd-o = 'exec-and-forget open -na Obsidian'
    cmd-d = 'exec-and-forget /bin/bash -lc "open -na Ghostty --args -e lazydocker"'

    # Focus.
    alt-left = 'focus left'
    alt-down = 'focus down'
    alt-up = 'focus up'
    alt-right = 'focus right'

    # Resize.
    alt-shift-left = 'resize width -50'
    alt-shift-right = 'resize width +50'
    alt-shift-up = 'resize height -50'
    alt-shift-down = 'resize height +50'

    # Move/reorder focused window.
    alt-ctrl-left = 'move left'
    alt-ctrl-down = 'move down'
    alt-ctrl-up = 'move up'
    alt-ctrl-right = 'move right'

    # Workspaces.
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'

    # Send focused window away without following it.
    alt-ctrl-1 = 'move-node-to-workspace 1'
    alt-ctrl-2 = 'move-node-to-workspace 2'
    alt-ctrl-3 = 'move-node-to-workspace 3'
    alt-ctrl-4 = 'move-node-to-workspace 4'
    alt-ctrl-5 = 'move-node-to-workspace 5'
    alt-ctrl-6 = 'move-node-to-workspace 6'

    # Tiling controls.
    alt-shift-f = 'fullscreen'
    alt-shift-space = 'layout floating tiling'
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-tab = 'exec-and-forget /bin/bash -lc "$HOME/.config/aerospace/scripts/next-active-workspace.sh"'

    # Service mode for rarely used/destructive operations.
    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    b = ['balance-sizes', 'mode main']
